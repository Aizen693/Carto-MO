import os
import glob

MEDIA_EXTENSIONS = [".mp3", ".wav", ".ogg", ".flac", ".aac", ".m4a", ".mp4", ".webm", ".mov"]

def find_media_files():
    files = []
    for ext in MEDIA_EXTENSIONS:
        files += glob.glob(f"**/*{ext}", recursive=True)
    # Exclure les dossiers système
    files = [f for f in files if not f.startswith(".github")]
    files.sort()
    return files

def generate_html(files):
    items = ""
    for f in files:
        name = os.path.basename(f)
        ext = os.path.splitext(f)[1].lower()
        is_video = ext in [".mp4", ".webm", ".mov"]
        icon = "🎬" if is_video else "🎵"
        tag = "video" if is_video else "audio"
        items += f"""
        <div class="media-item" onclick="playMedia('{f}', '{tag}', '{name}')">
            <span class="icon">{icon}</span>
            <div class="info">
                <div class="name">{name}</div>
                <div class="path">{f}</div>
            </div>
        </div>"""

    return f"""<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carto-MO Player</title>
  <style>
    * {{ margin: 0; padding: 0; box-sizing: border-box; }}
    body {{ background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; padding: 24px; }}
    h1 {{ color: #58a6ff; font-size: 22px; margin-bottom: 4px; }}
    .subtitle {{ color: #8b949e; font-size: 13px; margin-bottom: 24px; }}
    .player-box {{ background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 20px; }}
    .now-playing {{ font-size: 14px; font-weight: 600; color: #e6edf3; margin-bottom: 4px; }}
    .player-box audio, .player-box video {{ width: 100%; margin-top: 12px; border-radius: 8px; }}
    .list {{ background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; }}
    .list-header {{ padding: 10px 16px; border-bottom: 1px solid #30363d; font-size: 13px; color: #8b949e; }}
    .media-item {{ display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #21262d; transition: background 0.15s; }}
    .media-item:hover {{ background: #21262d; }}
    .media-item:last-child {{ border-bottom: none; }}
    .icon {{ font-size: 18px; }}
    .name {{ font-size: 14px; color: #e6edf3; }}
    .path {{ font-size: 12px; color: #6e7681; }}
    #player-container audio, #player-container video {{ display: none; }}
    #player-container .active {{ display: block; }}
  </style>
</head>
<body>
  <h1>🎵 Carto-MO Player</h1>
  <p class="subtitle">Index généré automatiquement — {len(files)} fichier(s)</p>

  <div class="player-box">
    <div class="now-playing" id="now-playing">Sélectionnez un fichier...</div>
    <div id="player-container">
      <audio id="audio-player" controls></audio>
      <video id="video-player" controls></video>
    </div>
  </div>

  <div class="list">
    <div class="list-header">{len(files)} fichier(s) détecté(s)</div>
    {items}
  </div>

  <script>
    function playMedia(src, type, name) {{
      document.getElementById('now-playing').textContent = name;
      const audio = document.getElementById('audio-player');
      const video = document.getElementById('video-player');
      audio.className = '';
      video.className = '';
      if (type === 'video') {{
        video.src = src;
        video.className = 'active';
        video.play();
      }} else {{
        audio.src = src;
        audio.className = 'active';
        audio.play();
      }}
    }}
  </script>
</body>
</html>"""

if __name__ == "__main__":
    files = find_media_files()
    html = generate_html(files)
    with open("index.html", "w", encoding="utf-8") as f:
        f.write(html)
    print(f"✅ index.html généré avec {len(files)} fichier(s)")
