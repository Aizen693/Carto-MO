<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau</title>
  <style>
    table {
      border-collapse: collapse;
      width: 100%;
      font-family: Arial, sans-serif;
      font-size: 14px;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background-color: #b7e1cd;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>Nom acteur</th>
        <th>Date</th>
        <th>Pays</th>
        <th>GPS</th>
        <th>Evenement</th>
        <th>Detail</th>
        <th>Sources</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Groupe jihadiste non identifié</td>
        <td>15/01/2024</td>
        <td>Niger</td>
        <td>15.85°N, 2.97°E</td>
        <td>Attaque dans la région du Sahel</td>
        <td>Attaque contre une patrouille ou un village dans la zone sahélienne, avec victimes et/ou blessés selon le cas.</td>
        <td>À compléter</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
