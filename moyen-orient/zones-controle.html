<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algor Int — Zones de contrôle MO · Animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111214;
  --bg1: #161819;
  --bg2: #1b1d1f;
  --bg3: #212326;
  --ln: rgba(255,255,255,0.07);
  --tx: #c8cdd6;
  --tx1: #727a87;
  --tx2: #3e444e;
  --txh: #e8ecf2;
  --ac: #c49a3c;
  --ach: #e0b452;
  --bc: 'Barlow Condensed', 'Arial Narrow', sans-serif;
  --b: 'Barlow', system-ui, sans-serif;
  --m: 'JetBrains Mono', 'Courier New', monospace;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  font-family: var(--m);
  background: var(--bg);
  color: var(--tx);
  height: 100vh;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT ── */
#app {
  display: grid;
  grid-template-rows: 42px 1fr 56px;
  height: 100vh;
}

/* ── HEADER ── */
#header {
  background: var(--bg1);
  border-bottom: 1px solid var(--ln);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
}
#header h1 {
  font-family: var(--bc);
  font-size: 13px;
  font-weight: 600;
  color: var(--txh);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
#header .sep {
  width: 1px;
  height: 18px;
  background: var(--ln);
}
#header .tag {
  font-family: var(--m);
  font-size: 9px;
  color: var(--ac);
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

/* ── MAP AREA ── */
#map-area {
  position: relative;
  overflow: hidden;
  background: var(--bg);
}

#map-svg {
  width: 100%;
  height: 100%;
}

/* ── LEGEND ── */
#legend {
  position: absolute;
  top: 16px;
  right: 16px;
  background: rgba(22,24,25,0.92);
  border: 1px solid var(--ln);
  padding: 12px 16px;
  max-width: 220px;
  backdrop-filter: blur(8px);
}
#legend h3 {
  font-family: var(--bc);
  font-size: 11px;
  font-weight: 600;
  color: var(--txh);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-label {
  font-family: var(--m);
  font-size: 8px;
  color: var(--tx1);
  letter-spacing: 0.04em;
}

/* ── PERIOD INFO ── */
#period-info {
  position: absolute;
  top: 16px;
  left: 16px;
  background: rgba(22,24,25,0.92);
  border: 1px solid var(--ln);
  padding: 14px 18px;
  backdrop-filter: blur(8px);
}
#period-info .period-label {
  font-family: var(--m);
  font-size: 8px;
  color: var(--ac);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
#period-info .period-title {
  font-family: var(--bc);
  font-size: 24px;
  font-weight: 600;
  color: var(--txh);
  letter-spacing: 0.03em;
}
#period-info .period-events {
  font-family: var(--m);
  font-size: 9px;
  color: var(--tx1);
  margin-top: 4px;
}

/* ── TIMELINE ── */
#timeline {
  background: var(--bg1);
  border-top: 1px solid var(--ln);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 8px;
}

#play-btn {
  width: 32px;
  height: 32px;
  background: var(--bg3);
  border: 1px solid var(--ln);
  color: var(--ac);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s;
}
#play-btn:hover {
  background: var(--bg2);
  border-color: var(--ac);
}

#timeline-track {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 3px;
  height: 100%;
}

.tl-period {
  flex: 1;
  height: 28px;
  background: var(--bg3);
  border: 1px solid transparent;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--m);
  font-size: 8px;
  color: var(--tx2);
  letter-spacing: 0.06em;
  transition: all 0.2s;
  position: relative;
}
.tl-period:hover {
  background: var(--bg2);
  color: var(--tx1);
}
.tl-period.active {
  border-color: var(--ac);
  color: var(--ac);
  background: rgba(196,154,60,0.08);
}
.tl-period.passed {
  background: rgba(196,154,60,0.04);
  color: var(--tx1);
}

#speed-label {
  font-family: var(--m);
  font-size: 8px;
  color: var(--tx2);
  letter-spacing: 0.08em;
  flex-shrink: 0;
  min-width: 40px;
  text-align: right;
}

/* ── ZONE ANIMATIONS ── */
.zone-circle {
  transition: r 0.8s ease-out, opacity 0.8s ease-out, fill-opacity 0.8s ease-out;
}
.zone-circle.hidden {
  r: 0;
  opacity: 0;
}

.event-dot {
  transition: r 0.4s ease-out, opacity 0.5s ease-out;
}
.event-dot.hidden {
  r: 0;
  opacity: 0;
}

/* pulse animation for active events */
@keyframes pulse {
  0% { stroke-opacity: 0.8; stroke-width: 2; }
  100% { stroke-opacity: 0; stroke-width: 8; }
}
.pulse-ring {
  animation: pulse 1.5s ease-out infinite;
  fill: none;
}

/* ── TOOLTIP ── */
#tooltip {
  position: absolute;
  display: none;
  background: rgba(22,24,25,0.95);
  border: 1px solid var(--ac);
  padding: 10px 14px;
  max-width: 280px;
  pointer-events: none;
  backdrop-filter: blur(8px);
  z-index: 100;
}
#tooltip .tt-actor {
  font-family: var(--bc);
  font-size: 12px;
  color: var(--ac);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
#tooltip .tt-event {
  font-family: var(--b);
  font-size: 10px;
  color: var(--txh);
  margin-top: 4px;
  line-height: 1.5;
}
#tooltip .tt-date {
  font-family: var(--m);
  font-size: 8px;
  color: var(--tx1);
  margin-top: 4px;
}
</style>
</head>

  for (const [key, color] of Object.entries(ACTOR_COLORS)) {

  return '#c49a3c';

  const x = ((lon - 30) / 30) * 1200;

// ── BUILD TIMELINE ──
const track = document.getElementById('timeline-track');
PERIODS.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'tl-period' + (i === 0 ? ' active' : '');
  el.textContent = p.label;
  el.dataset.index = i;
  el.addEventListener('click', () => goToPeriod(i));
  track.appendChild(el);
});

// ── STATE ──
let currentPeriod = 0;
let playing = false;
let playInterval = null;
const SPEED = 3000;

// ── SVG REFS ──
const zonesLayer = document.getElementById('zones-layer');
const eventsLayer = document.getElementById('events-layer');
const pulseLayer = document.getElementById('pulse-layer');
const tooltip = document.getElementById('tooltip');

// ── RENDER ──
function renderPeriod(index, animate = true) {
  currentPeriod = index;
  const period = PERIODS[index];

  // Update info
  document.getElementById('period-title-text').textContent = period.label;
  document.getElementById('period-events-text').textContent = period.events.length + ' evenements';

  // Update timeline
  document.querySelectorAll('.tl-period').forEach((el, i) => {
    el.classList.remove('active', 'passed');
    if (i === index) el.classList.add('active');
    else if (i < index) el.classList.add('passed');
  });

  // Clear layers
  zonesLayer.innerHTML = '';
  eventsLayer.innerHTML = '';
  pulseLayer.innerHTML = '';

  // Collect all events up to current period for zones
  const allEvents = [];
  for (let i = 0; i <= index; i++) {
    PERIODS[i].events.forEach(ev => {
      allEvents.push({ ...ev, current: i === index, periodIdx: i });
    });
  }

  // Draw influence zones (large blurred circles for actors with multiple events)
  const actorPositions = {};
  allEvents.forEach(ev => {
    if (!actorPositions[ev.actor]) actorPositions[ev.actor] = [];
    actorPositions[ev.actor].push(ev);
  });

  Object.entries(actorPositions).forEach(([actor, events]) => {
    if (events.length < 1) return;
    // Compute centroid
    let cx = 0, cy = 0;
    events.forEach(ev => {
      const pos = gpsToSvg(ev.lat, ev.lon);
      cx += pos.x;
      cy += pos.y;
    });
    cx /= events.length;
    cy /= events.length;

    // Radius based on spread + count
    let maxDist = 0;
    events.forEach(ev => {
      const pos = gpsToSvg(ev.lat, ev.lon);
      const d = Math.sqrt((pos.x - cx) ** 2 + (pos.y - cy) ** 2);
      if (d > maxDist) maxDist = d;
    });
    const radius = Math.max(30, maxDist * 0.6 + events.length * 8);

    const color = getColor(actor);
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('fill', color);
    circle.setAttribute('fill-opacity', '0.12');
    circle.setAttribute('stroke', 'none');
    circle.classList.add('zone-circle');

    if (animate) {
      circle.setAttribute('r', '0');
      circle.classList.add('hidden');
      zonesLayer.appendChild(circle);
      requestAnimationFrame(() => {
        circle.classList.remove('hidden');
        circle.setAttribute('r', radius);
      });
    } else {
      circle.setAttribute('r', radius);
      zonesLayer.appendChild(circle);
    }
  });

  // Draw event dots
  allEvents.forEach((ev, i) => {
    const pos = gpsToSvg(ev.lat, ev.lon);
    const color = getColor(ev.actor);
    const isCurrent = ev.current;

    const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    dot.setAttribute('cx', pos.x);
    dot.setAttribute('cy', pos.y);
    dot.setAttribute('fill', color);
    dot.setAttribute('fill-opacity', isCurrent ? '0.9' : '0.3');
    dot.setAttribute('stroke', isCurrent ? color : 'none');
    dot.setAttribute('stroke-width', isCurrent ? '1.5' : '0');
    dot.setAttribute('stroke-opacity', '0.5');
    dot.classList.add('event-dot');
    dot.style.cursor = 'pointer';

    if (animate && isCurrent) {
      dot.setAttribute('r', '0');
      dot.classList.add('hidden');
      eventsLayer.appendChild(dot);
      setTimeout(() => {
        dot.classList.remove('hidden');
        dot.setAttribute('r', isCurrent ? 5 : 3);
      }, i * 80);
    } else {
      dot.setAttribute('r', isCurrent ? 5 : 3);
      eventsLayer.appendChild(dot);
    }

    // Pulse for current events
    if (isCurrent) {
      const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      pulse.setAttribute('cx', pos.x);
      pulse.setAttribute('cy', pos.y);
      pulse.setAttribute('r', '5');
      pulse.setAttribute('stroke', color);
      pulse.classList.add('pulse-ring');
      pulseLayer.appendChild(pulse);
    }

    // Tooltip
    dot.addEventListener('mouseenter', (e) => {
      tooltip.style.display = 'block';
      tooltip.querySelector('.tt-actor').textContent = ev.actor;
      tooltip.querySelector('.tt-event').textContent = ev.event + (ev.detail ? ' — ' + ev.detail : '');
      tooltip.querySelector('.tt-date').textContent = ev.date;
    });
    dot.addEventListener('mousemove', (e) => {
      const rect = document.getElementById('map-area').getBoundingClientRect();
      let tx = e.clientX - rect.left + 12;
      let ty = e.clientY - rect.top - 10;
      if (tx + 280 > rect.width) tx = e.clientX - rect.left - 290;
      tooltip.style.left = tx + 'px';
      tooltip.style.top = ty + 'px';
    });
    dot.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
}

function goToPeriod(index) {
  if (index < 0 || index >= PERIODS.length) {
    if (playing) stopPlay();
    return;
  }
  renderPeriod(index);
}

function nextPeriod() {
  if (currentPeriod < PERIODS.length - 1) {
    goToPeriod(currentPeriod + 1);
  } else {
    stopPlay();
  }
}

// ── PLAY / PAUSE ──
const playBtn = document.getElementById('play-btn');

function startPlay() {
  playing = true;
  playBtn.innerHTML = '&#9646;&#9646;';
  if (currentPeriod >= PERIODS.length - 1) goToPeriod(0);
  playInterval = setInterval(nextPeriod, SPEED);
}

function stopPlay() {
  playing = false;
  playBtn.innerHTML = '&#9654;';
  clearInterval(playInterval);
}

playBtn.addEventListener('click', () => {
  if (playing) stopPlay();
  else startPlay();
});

// ── INIT ──
renderPeriod(0, false);
</script>
