:root {
  --bg:    #111214;
  --bg1:   #161819;
  --bg2:   #1b1d1f;
  --bg3:   #212326;
  --bg4:   #2a2c30;
  --ln:    rgba(255,255,255,0.07);
  --ln1:   rgba(255,255,255,0.12);
  --ln2:   rgba(255,255,255,0.20);
  --tx:    #c8cdd6;
  --tx1:   #727a87;
  --tx2:   #3e444e;
  --txh:   #e8ecf2;
  --ac:    #c49a3c;
  --ach:   #e0b452;
  --acd:   rgba(196,154,60,0.09);
  --acb:   rgba(196,154,60,0.20);
  --err:   #a84040;
  --bc:  'Barlow Condensed', 'Arial Narrow', sans-serif;
  --b:   'Barlow', system-ui, sans-serif;
  --m:   'JetBrains Mono', 'Courier New', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  font-family: var(--m);
  background: var(--bg);
  color: var(--tx);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  letter-spacing: 0;
}

#header {
  height: 40px;
  background: var(--bg1);
  border-bottom: 1px solid var(--ln);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  z-index: 30;
  position: relative;
}

#header-left {
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px;
  border-right: 1px solid var(--ln);
  flex-shrink: 0;
}
#header img { height: 19px; opacity: 0.7; }
#header h1 {
  font-family: var(--bc); font-size: 13px; font-weight: 600;
  color: var(--txh); letter-spacing: 0.05em; text-transform: uppercase;
  line-height: 1; white-space: nowrap;
}
#header p {
  font-family: var(--m); font-size: 7px; color: var(--tx2);
  letter-spacing: 0.15em; text-transform: uppercase;
  margin-top: 3px; white-space: nowrap;
}

.hdr-cell {
  display: flex; align-items: center;
  padding: 0 12px; border-right: 1px solid var(--ln);
  gap: 8px; flex-shrink: 0;
}
.hdr-cell-label {
  font-family: var(--m); font-size: 7px; color: var(--tx2);
  letter-spacing: 0.14em; text-transform: uppercase;
}
#period-badge {
  font-family: var(--m); font-size: 9px; font-weight: 400;
  color: var(--ach); letter-spacing: 0.07em;
}
#event-counter {
  font-family: var(--m); font-size: 9px; color: var(--tx1);
  letter-spacing: 0.05em; display: none;
}

.hdr-spacer { flex: 1; }

.hdr-controls {
  display: flex; align-items: stretch;
  border-left: 1px solid var(--ln);
}
.hbtn {
  font-family: var(--m); font-size: 8px;
  color: var(--tx2); background: transparent;
  border: none; border-left: 1px solid var(--ln);
  padding: 0 12px; cursor: pointer;
  transition: color .1s, background .1s;
  letter-spacing: 0.09em; text-transform: uppercase;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.hbtn:first-child { border-left: none; }
.hbtn:hover  { color: var(--tx); background: var(--bg2); }
.hbtn.active { color: var(--ach); background: var(--acd); }

#style-toggle-header { display: flex; border-left: 1px solid var(--ln); }
.style-btn {
  font-family: var(--m); font-size: 8px; color: var(--tx2);
  background: transparent; border: none; border-left: 1px solid var(--ln);
  padding: 0 10px; cursor: pointer; transition: all .1s;
  letter-spacing: 0.09em; text-transform: uppercase;
  display: flex; align-items: center;
}
.style-btn:first-child { border-left: none; }
.style-btn:hover  { color: var(--tx); background: var(--bg2); }
.style-btn.active { color: var(--ach); background: var(--acd); }

.float-btn {
  font-family: var(--m); font-size: 8px; color: var(--tx2);
  background: transparent; border: none; border-left: 1px solid var(--ln);
  padding: 0 12px; cursor: pointer; transition: all .1s;
  letter-spacing: 0.09em; text-transform: uppercase;
  display: flex; align-items: center;
}
.float-btn:hover, .float-btn.active { color: var(--tx); background: var(--bg2); }

#progress-bar  { height: 1px; background: var(--bg3); flex-shrink: 0; }
#progress-fill { height: 100%; width: 0%; background: var(--ac); transition: width .4s ease; }

#map-container { flex: 1; display: flex; position: relative; overflow: hidden; }
#map, #map2    { flex: 1; position: relative; cursor: crosshair !important; }
#map2 { display: none; border-left: 1px solid var(--ln); }
.mapboxgl-canvas { cursor: crosshair !important; }

#split-label-1, #split-label-2 {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: var(--bg1); border: 1px solid var(--ln);
  padding: 3px 9px; font: 400 8px/1 var(--m); color: var(--tx1);
  z-index: 5; pointer-events: none; display: none;
  letter-spacing: 0.1em; text-transform: uppercase;
}
#split-label-1 { left: 25%; } #split-label-2 { left: 75%; }

#hover-tooltip {
  position: fixed;
  background: var(--bg1);
  border: 1px solid var(--ln1);
  border-left: 2px solid var(--ac);
  padding: 5px 10px;
  font: 400 9px/1.4 var(--m); color: var(--txh);
  pointer-events: none; z-index: 200; display: none;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(0,0,0,0.7);
}
.tooltip-dot {
  display: inline-block; width: 5px; height: 5px;
  border-radius: 50%; margin-right: 7px; vertical-align: middle;
}

#legend {
  position: absolute; top: 12px; left: 12px;
  background: rgba(17,18,20,0.97);
  border: 1px solid var(--ln);
  border-top: 1px solid var(--ac);
  z-index: 5; min-width: 180px; max-width: 200px; overflow: hidden;
}
#legend-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px; cursor: pointer; user-select: none;
  border-bottom: 1px solid var(--ln);
}
#legend-header:hover { background: var(--bg2); }
#legend-title {
  font: 600 8px/1 var(--bc); letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--tx1);
}
#legend-toggle { font-size: 8px; color: var(--tx2); transition: transform .2s; }
#legend-toggle.open { transform: rotate(180deg); }
#legend-body { max-height: 55vh; overflow-y: auto; padding: 4px 0; transition: max-height .3s; }
#legend-body.collapsed { max-height: 0; padding: 0; overflow: hidden; }
.legend-group { padding: 0 10px; }
.legend-group-title {
  font: 600 7px/1 var(--bc); letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--tx2); padding: 5px 0 3px;
  border-top: 1px solid var(--bg3); margin-top: 2px;
}
.legend-group:first-child .legend-group-title { border-top: none; margin-top: 0; }
.legend-item {
  display: flex; align-items: center; gap: 7px;
  font: 300 9px/1 var(--b); color: var(--tx1);
  margin-bottom: 2px; padding: 2px 3px;
  cursor: pointer; transition: color .1s; user-select: none;
}
.legend-item:hover { color: var(--txh); }
.legend-item.filtered-out { opacity: 0.1; }
.legend-item.active-filter { color: var(--ach); }
.legend-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

#chart-drawer { position: absolute; bottom: 130px; right: 0; z-index: 6; display: flex; align-items: center; }
#chart-tab {
  background: rgba(17,18,20,0.97);
  border: 1px solid var(--ln); border-right: none;
  padding: 11px 5px; cursor: pointer; writing-mode: vertical-rl;
  font: 400 7px/1 var(--m); letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--tx2); transition: all .1s; user-select: none;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
#chart-tab:hover { color: var(--tx1); }
#chart-tab-count { font: 500 9px/1 var(--m); color: var(--ach); writing-mode: vertical-rl; }
#chart-panel {
  background: rgba(17,18,20,0.98);
  border: 1px solid var(--ln); border-right: none; border-top: 1px solid var(--ac);
  width: 0; overflow: hidden; transition: width .3s ease;
  max-height: 48vh; display: flex; flex-direction: column;
}
#chart-panel.open { width: 215px; }
#chart-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 10px 5px; border-bottom: 1px solid var(--ln); flex-shrink: 0;
}
#chart-header span { font: 600 7px/1 var(--bc); letter-spacing: 0.14em; text-transform: uppercase; color: var(--tx2); white-space: nowrap; }
.chart-count { font: 400 9px/1 var(--m); color: var(--ach); }
#chart-body { padding: 7px 10px 10px; overflow-y: auto; flex: 1; }
